<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spell Effect Lab</title>
    <script type="module" crossorigin src="../assets/spellEffectLab-BgDTCeCr.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/paperRenderer-Dd0D2qyX.js">
    <link rel="modulepreload" crossorigin href="../assets/spellEffectRenderer-BEr-3Eyo.js">
    <link rel="modulepreload" crossorigin href="../assets/debugOverlay-DONpHWOa.js">
    <link rel="modulepreload" crossorigin href="../assets/glyphOverlayRenderer-CsSyWi4k.js">
    <link rel="stylesheet" crossorigin href="../assets/paperRenderer-Dq1hb4TC.css">
  </head>
  <body class="sigil-maker-page">
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Effect Tool</p>
          <h1>Spell Effect Lab</h1>
        </div>
        <div class="status-pill" id="statusPill">Ready</div>
      </header>

      <main class="workspace maker-workspace effect-lab-workspace">
        <section class="canvas-panel maker-canvas-panel">
          <div class="toolbar effect-lab-toolbar">
            <select class="select-control" id="elementControl">
              <option value="fire">Fire</option>
              <option value="water" selected>Water</option>
              <option value="wind">Wind</option>
              <option value="earth">Earth</option>
              <option value="light">Light</option>
            </select>
            <button type="button" id="resetButton">Reset Particles</button>
          </div>
          <div class="canvas-shell effect-lab-canvas-shell portal-active">
            <canvas id="labGlyphCanvas" width="900" height="700"></canvas>
            <canvas id="labEffectCanvas" width="900" height="700"></canvas>
          </div>
        </section>

        <aside class="side-panel effect-lab-side-panel">
          <section class="diagnostic-block effect-lab-controls" id="sliderControls"></section>

          <section class="diagnostic-block">
            <h2>Paste IR</h2>
            <p class="effect-lab-help">Apply IR loads values from pasted JSON. Copy Current IR writes the sliders back into JSON for testing.</p>
            <textarea id="irInput" class="template-output effect-lab-ir-input" spellcheck="false"></textarea>
            <div class="effect-lab-button-row">
              <button type="button" id="applyIrButton">Apply IR</button>
              <button type="button" id="copyIrButton">Copy Current IR</button>
            </div>
          </section>

          <section class="diagnostic-block">
            <h2>Current IR</h2>
            <pre id="irOutput" class="diagnostic-output effect-lab-ir-output"></pre>
          </section>
        </aside>
      </main>
    </div>

  </body>
</html>
