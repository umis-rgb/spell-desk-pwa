<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stroke Template Viewer</title>
    <script type="module" crossorigin src="../assets/strokeTemplateViewer-JGPphcwW.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/paperRenderer-Dd0D2qyX.js">
    <link rel="stylesheet" crossorigin href="../assets/paperRenderer-Dq1hb4TC.css">
  </head>
  <body class="sigil-maker-page">
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Template Tool</p>
          <h1>Stroke Template Viewer</h1>
        </div>
        <div class="status-pill" id="statusPill">Ready</div>
      </header>

      <main class="workspace maker-workspace">
        <section class="canvas-panel maker-canvas-panel">
          <div class="toolbar">
            <button type="button" id="renderButton">Render</button>
            <button type="button" id="clearButton">Clear</button>
          </div>
          <div class="reference-canvas-shell">
            <canvas id="previewCanvas" width="800" height="800"></canvas>
          </div>
        </section>

        <aside class="side-panel">
          <section class="diagnostic-block">
            <h2>Template JSON</h2>
            <textarea id="templateInput" class="template-output" spellcheck="false"></textarea>
          </section>
          <section class="diagnostic-block">
            <h2>Metrics</h2>
            <pre id="metricsOutput" class="diagnostic-output">Paste a strokeTemplate object or a full dictionary entry, then click Render.</pre>
          </section>
        </aside>
      </main>
    </div>

  </body>
</html>
