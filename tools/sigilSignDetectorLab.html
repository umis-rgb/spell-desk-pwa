<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sigil/Sign Detector Lab</title>
    <script type="module" crossorigin src="../assets/sigilSignDetectorLab-DBr9r1-W.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/paperRenderer-Dd0D2qyX.js">
    <link rel="modulepreload" crossorigin href="../assets/templateNormalizer-DNqUxjE5.js">
    <link rel="modulepreload" crossorigin href="../assets/symbolRecognizer-B8q3ilQB.js">
    <link rel="modulepreload" crossorigin href="../assets/debugOverlay-DONpHWOa.js">
    <link rel="modulepreload" crossorigin href="../assets/glyphOverlayRenderer-CsSyWi4k.js">
    <link rel="stylesheet" crossorigin href="../assets/paperRenderer-Dq1hb4TC.css">
  </head>
  <body class="sigil-maker-page">
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Detector Tool</p>
          <h1>Sigil/Sign Detector Lab</h1>
        </div>
        <div class="status-pill" id="statusPill">Loading</div>
      </header>

      <main class="workspace maker-workspace detector-lab-workspace">
        <section class="canvas-panel maker-canvas-panel">
          <div class="toolbar detector-lab-toolbar">
            <button type="button" id="undoButton">Undo</button>
            <button type="button" id="clearButton">Clear</button>
            <select class="select-control" id="dictionaryMode">
              <option value="all">Sigils + Signs</option>
              <option value="sigils">Sigils</option>
              <option value="signs">Signs</option>
            </select>
            <select class="select-control" id="referenceOverlay">
              <option value="">No trace reference</option>
            </select>
            <label class="toggle">
              <input type="checkbox" id="paperOverlayToggle" checked>
              <span>Paper Overlay</span>
            </label>
          </div>
          <div class="detector-lab-canvas-shell">
            <canvas id="detectorCanvas" width="760" height="760"></canvas>
          </div>
        </section>

        <aside class="side-panel detector-lab-side-panel">
          <section class="diagnostic-block">
            <h2>Decision</h2>
            <div class="detector-lab-decision-grid">
              <span>Recognized</span><strong id="recognizedValue">false</strong>
              <span>Kind</span><strong id="kindValue">none</strong>
              <span>ID</span><strong id="idValue">none</strong>
              <span>Confidence</span><strong id="confidenceValue">0%</strong>
              <span>Template</span><strong id="templateValue">0%</strong>
              <span>Ink</span><strong id="inkValue">0%</strong>
              <span>Explained</span><strong id="explainedValue">0%</strong>
              <span>Rotation</span><strong id="rotationValue">0 deg</strong>
            </div>
          </section>

          <section class="diagnostic-block">
            <h2>Top Matches</h2>
            <div id="matchList" class="detector-match-list"></div>
          </section>

          <section class="diagnostic-block">
            <h2>Recognition JSON</h2>
            <pre id="recognitionOutput" class="diagnostic-output detector-lab-small-output">Draw one sigil or sign.</pre>
          </section>

          <section class="diagnostic-block">
            <h2>Candidate JSON</h2>
            <pre id="candidateOutput" class="diagnostic-output detector-lab-small-output">Draw one sigil or sign.</pre>
          </section>
        </aside>
      </main>
    </div>

  </body>
</html>
